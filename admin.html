<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MB Community Engagement Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-6">
<div class="max-w-5xl mx-auto">
<header class="mb-6 flex justify-between items-center">
<div>
<h1 class="text-3xl font-bold text-blue-600">Engagement Logs</h1>
<p class="text-gray-500">Live feed of 30-Day Challenge responses</p>
</div>
<button onclick="fetchLogs()" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700 transition">Refresh Data</button>
</header>
<div class="mb-4 flex justify-between items-center bg-white p-4 rounded-lg shadow">
<div class="flex items-center space-x-4">
<label for="dateFilter" class="font-medium text-gray-700">Filter by Date:</label>
<select id="dateFilter" onchange="applyFilter()" class="border border-gray-300 rounded px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
<option value="all">All Time</option>
</select>
</div>
<div class="text-sm font-medium text-gray-600">
Total Responses: <span id="responseCount" class="text-blue-600 font-bold text-lg">0</span>
</div>
</div>
<div class="bg-white rounded-lg shadow overflow-hidden">
<table class="min-w-full divide-y divide-gray-200">
<thead class="bg-gray-100">
<tr>
<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Time</th>
<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">User</th>
<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Response</th>
</tr>
</thead>
<tbody id="logTableBody" class="bg-white divide-y divide-gray-200">
<tr><td colspan="3" class="px-6 py-4 text-center text-gray-500">Enter password to load logs...</td></tr>
</tbody>
</table>
</div>
</div>
<script>
let globalLogs = [];

async function fetchLogs() {
const secret = prompt("Please enter the Admin Password:");
if (!secret) return;
const tbody = document.getElementById('logTableBody');
tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-4 text-center text-gray-500">Loading data...</td></tr>';
try {
const response = await fetch(`/api/logs?secret=${secret}`);
if (response.status === 401) {
alert("Incorrect Password!");
tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-4 text-center text-red-500">Unauthorized access.</td></tr>';
return;
}
globalLogs = await response.json();
if (globalLogs.length === 0) {
tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-4 text-center text-gray-500">No responses recorded yet.</td></tr>';
document.getElementById('responseCount').innerText = '0';
return;
}
populateDateDropdown();
applyFilter();
} catch (error) {
console.error("Error fetching logs:", error);
tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-4 text-center text-red-500">Failed to load data.</td></tr>';
}
}

function populateDateDropdown() {
const dateSelect = document.getElementById('dateFilter');
const uniqueDates = [...new Set(globalLogs.map(log => new Date(log.timestamp).toLocaleDateString()))];
dateSelect.innerHTML = '<option value="all">All Time</option>';
uniqueDates.forEach(date => {
const option = document.createElement('option');
option.value = date;
option.textContent = date;
dateSelect.appendChild(option);
});
}

function applyFilter() {
const selectedDate = document.getElementById('dateFilter').value;
const tbody = document.getElementById('logTableBody');
const countSpan = document.getElementById('responseCount');

let filteredLogs = globalLogs;
if (selectedDate !== 'all') {
filteredLogs = globalLogs.filter(log => new Date(log.timestamp).toLocaleDateString() === selectedDate);
}

countSpan.innerText = filteredLogs.length;

if (filteredLogs.length === 0) {
tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-4 text-center text-gray-500">No responses for this date.</td></tr>';
return;
}

tbody.innerHTML = filteredLogs.map(log => `
<tr class="hover:bg-gray-50">
<td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${new Date(log.timestamp).toLocaleTimeString()}</td>
<td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${log.userName || log.userId}</td>
<td class="px-6 py-4 text-sm text-gray-700 break-words">${log.message}</td>
</tr>
`).join('');
}
</script>
</body>
</html>
