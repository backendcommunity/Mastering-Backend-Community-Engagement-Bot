<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MB Community Engagement Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-6">
<div class="max-w-5xl mx-auto">
<header class="mb-8 flex justify-between items-center">
<div>
<h1 class="text-3xl font-bold text-blue-600">Engagement Logs</h1>
<p class="text-gray-500">Live feed of 30-Day Challenge responses</p>
</div>
<button onclick="fetchLogs()" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700 transition">Refresh Data</button>
</header>
<div class="bg-white rounded-lg shadow overflow-hidden">
<table class="min-w-full divide-y divide-gray-200">
<thead class="bg-gray-100">
<tr>
<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date/Time</th>
<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">User</th>
<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Response</th>
</tr>
</thead>
<tbody id="logTableBody" class="bg-white divide-y divide-gray-200">
<tr><td colspan="3" class="px-6 py-4 text-center text-gray-500">Enter password to load logs...</td></tr>
</tbody>
</table>
</div>
</div>

<script>
async function fetchLogs() {
const secret = prompt("Please enter the Admin Password:");
if (!secret) return;
const tbody = document.getElementById('logTableBody');
tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-4 text-center text-gray-500">Loading data...</td></tr>';
try {
const response = await fetch(`/api/logs?secret=${secret}`);
if (response.status === 401) {
alert("Incorrect Password!");
tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-4 text-center text-red-500">Unauthorized access.</td></tr>';
return;
}
const logs = await response.json();
if (logs.length === 0) {
tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-4 text-center text-gray-500">No responses recorded yet.</td></tr>';
return;
}
tbody.innerHTML = logs.map(log => `
<tr class="hover:bg-gray-50">
<td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${new Date(log.timestamp).toLocaleString()}</td>
<td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${log.userName || log.userId}</td>
<td class="px-6 py-4 text-sm text-gray-700 break-words">${log.message}</td>
</tr>
`).join('');
} catch (error) {
console.error("Error fetching logs:", error);
tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-4 text-center text-red-500">Failed to load data.</td></tr>';
}
}
</script>
</body>
</html>
